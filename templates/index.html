<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毒舌老友 - 六位老友陪吐槽</title>
    <style>
        /* ============================================
           简约赛博朋克主题 - 毒舌老友
           ============================================ */
        
        :root {
            --cyber-dark: #0f0f1a;
            --cyber-darker: #080810;
            --cyber-blue: #00d4ff;
            --cyber-green: #00e676;
            --cyber-yellow: #ffd600;
            --cyber-pink: #ff4081;
            --cyber-purple: #7c4dff;
            --cyber-text: #e0e0e8;
            --cyber-text-dim: #9090a0;
            --cyber-border: #252538;
            --cyber-surface: #181825;
            --cyber-surface-light: #252538;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--cyber-darker);
            color: var(--cyber-text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题样式 - 简约 */
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 8px;
            color: var(--cyber-blue);
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--cyber-text-dim);
            margin-bottom: 25px;
            font-size: 1rem;
        }

        /* 卡片容器 - 简约 */
        .card-container {
            background: var(--cyber-surface);
            border: 1px solid var(--cyber-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* 区块标题 */
        .section-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--cyber-blue);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--cyber-blue);
            border-radius: 2px;
        }

        /* ============================================
           朋友选择器
           ============================================ */
        
        .friend-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (max-width: 600px) {
            .friend-selector {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            h1 {
                font-size: 2rem;
            }
        }

        .friend-card {
            background: var(--cyber-surface-light);
            border: 2px solid var(--cyber-border);
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .friend-card:hover {
            border-color: var(--cyber-blue);
            transform: translateY(-2px);
        }

        .friend-card.selected {
            border-color: var(--cyber-blue);
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 0 1px var(--cyber-blue);
        }

        .friend-card.selected::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 8px;
            color: var(--cyber-green);
            font-weight: bold;
        }

        .friend-avatar {
            font-size: 2.2em;
            margin-bottom: 6px;
        }

        .friend-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--cyber-text);
            margin-bottom: 2px;
        }

        .friend-intro {
            font-size: 0.8rem;
            color: var(--cyber-text-dim);
        }

        /* ============================================
           毒舌等级按钮
           ============================================ */
        
        .toxicity-selector {
            margin: 20px 0;
        }

        .toxicity-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        @media (max-width: 600px) {
            .toxicity-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .toxicity-btn {
            padding: 14px 8px;
            border: 2px solid;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--cyber-surface-light);
        }

        .toxicity-btn:hover {
            transform: translateY(-2px);
        }

        /* 等级1：柔和 - 蓝色 */
        .toxicity-btn.level-1 {
            color: var(--cyber-blue);
            border-color: var(--cyber-blue);
        }
        .toxicity-btn.level-1.selected {
            background: rgba(0, 212, 255, 0.15);
        }

        /* 等级2：直白 - 绿色 */
        .toxicity-btn.level-2 {
            color: var(--cyber-green);
            border-color: var(--cyber-green);
        }
        .toxicity-btn.level-2.selected {
            background: rgba(0, 230, 118, 0.15);
        }

        /* 等级3：狠辣 - 黄色 */
        .toxicity-btn.level-3 {
            color: var(--cyber-yellow);
            border-color: var(--cyber-yellow);
        }
        .toxicity-btn.level-3.selected {
            background: rgba(255, 214, 0, 0.15);
        }

        /* 等级4：疯狂 - 粉色 */
        .toxicity-btn.level-4 {
            color: var(--cyber-pink);
            border-color: var(--cyber-pink);
        }
        .toxicity-btn.level-4.selected {
            background: rgba(255, 64, 129, 0.15);
        }

        .toxicity-desc {
            display: block;
            font-size: 0.75rem;
            margin-top: 3px;
            opacity: 0.8;
            font-weight: normal;
        }

        .current-level-indicator {
            margin-top: 12px;
            padding: 10px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 6px;
            border-left: 3px solid var(--cyber-blue);
            text-align: center;
        }

        .current-level-name {
            color: var(--cyber-blue);
            font-weight: 600;
        }

        /* ============================================
           按钮布局
           ============================================ */
        
        .action-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--cyber-border);
        }

        .main-buttons-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 15px 0;
        }

        .main-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .start-chat-btn {
            background: var(--cyber-blue);
            color: var(--cyber-darker);
        }
        .start-chat-btn:hover:not(:disabled) {
            background: #33ddff;
            transform: translateY(-2px);
        }
        .start-chat-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .restart-btn {
            background: transparent;
            color: var(--cyber-pink);
            border: 2px solid var(--cyber-pink);
        }
        .restart-btn:hover {
            background: rgba(255, 64, 129, 0.1);
        }

        /* ============================================
           聊天区域
           ============================================ */
        
        .chat-area {
            border: 1px solid var(--cyber-border);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            height: 300px;
            overflow-y: auto;
            background: var(--cyber-darker);
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: var(--cyber-surface);
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--cyber-blue);
            border-radius: 3px;
        }

        .message {
            margin: 10px 0;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 85%;
            animation: messageSlide 0.2s ease-out;
            line-height: 1.5;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.3);
            margin-left: auto;
        }

        .friend-message {
            background: rgba(0, 230, 118, 0.15);
            border: 1px solid rgba(0, 230, 118, 0.3);
            margin-right: auto;
        }

        .system-message {
            background: rgba(124, 77, 255, 0.15);
            border: 1px solid rgba(124, 77, 255, 0.3);
            margin: 10px auto;
            text-align: center;
            max-width: 90%;
            font-size: 0.9rem;
            color: var(--cyber-text-dim);
        }

        .message-sender {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 3px;
            opacity: 0.8;
        }

        .user-message .message-sender { color: var(--cyber-blue); }
        .friend-message .message-sender { color: var(--cyber-green); }
        .system-message .message-sender { color: var(--cyber-purple); }

        /* 聊天控制 */
        .chat-controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin: 15px 0;
        }

        @media (max-width: 600px) {
            .chat-controls {
                grid-template-columns: 1fr;
            }
        }

        .message-input {
            padding: 12px;
            border: 1px solid var(--cyber-border);
            border-radius: 8px;
            background: var(--cyber-surface);
            color: var(--cyber-text);
            font-size: 1rem;
        }
        .message-input:focus {
            outline: none;
            border-color: var(--cyber-blue);
        }
        .message-input::placeholder {
            color: var(--cyber-text-dim);
        }
        .message-input:disabled {
            opacity: 0.5;
        }

        .send-btn {
            padding: 12px 24px;
            background: var(--cyber-green);
            color: var(--cyber-darker);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .send-btn:hover:not(:disabled) {
            background: #33eb7a;
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 提示信息 */
        .operation-hint {
            text-align: center;
            color: var(--cyber-text-dim);
            font-size: 0.85rem;
            margin-top: 10px;
        }

        /* 打字指示器 */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 14px;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.3);
            border-radius: 10px;
            max-width: 80px;
            margin: 10px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--cyber-green);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 隐藏 */
        .hidden {
            display: none !important;
        }

        /* 提示弹窗 */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--cyber-surface);
            border: 1px solid var(--cyber-purple);
            color: var(--cyber-text);
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10000;
            animation: toastSlide 0.3s ease-out;
        }
        @keyframes toastSlide {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>毒舌老友 🎭</h1>
        <p class="subtitle">选择一位老友，调整毒舌等级，开始吐槽吧！</p>
        
        <!-- 步骤1: 选择老友 -->
        <div class="card-container">
            <div class="section-title">步骤 1: 选择老友</div>
            <div class="friend-selector" id="friendSelector"></div>
        </div>
        
        <!-- 步骤2: 选择毒舌等级 -->
        <div class="card-container">
            <div class="section-title">步骤 2: 选择毒舌等级</div>
            <div class="toxicity-selector">
                <div class="toxicity-buttons">
                    <button class="toxicity-btn level-1" data-level="1" onclick="selectToxicity(1)">
                        温和
                        <span class="toxicity-desc">温柔理解</span>
                    </button>
                    <button class="toxicity-btn level-2" data-level="2" onclick="selectToxicity(2)">
                        直白
                        <span class="toxicity-desc">直接吐槽</span>
                    </button>
                    <button class="toxicity-btn level-3" data-level="3" onclick="selectToxicity(3)">
                        毒舌
                        <span class="toxicity-desc">火力全开</span>
                    </button>
                    <button class="toxicity-btn level-4" data-level="4" onclick="selectToxicity(4)">
                        疯狂
                        <span class="toxicity-desc">往死里骂</span>
                    </button>
                </div>
                <div class="current-level-indicator">
                    当前等级: <span class="current-level-name" id="currentLevelName">直白</span>
                </div>
            </div>
            
            <!-- 步骤3: 开始聊天 -->
            <div class="action-section">
                <div class="section-title">步骤 3: 开始对话</div>
                <div class="main-buttons-container" id="actionButtons">
                    <button class="main-btn start-chat-btn" id="startButton" onclick="startChat()">
                        <span>🚀</span>
                        <span>开始聊天</span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 聊天区域 -->
        <div class="card-container hidden" id="chatContainer">
            <div class="section-title">💬 对话记录</div>
            <div class="chat-area" id="chatArea"></div>
            
            <div class="chat-controls">
                <input type="text" id="messageInput" class="message-input" placeholder="输入你想吐槽的人或事..." onkeypress="handleKeyPress(event)" disabled>
                <button id="sendButton" class="send-btn" onclick="sendMessage()" disabled>发送</button>
            </div>
            
            <div class="operation-hint">按 Enter 键快速发送消息</div>
        </div>
    </div>

    <script>
        // ============================================
        // 毒舌老友 - JavaScript
        // ============================================
        
        let currentFriend = 'chandler';
        let currentToxicity = 2;
        let chatStarted = false;
        let lastApiFriend = 'chandler'; // 记录API端当前的好友
        
        const friends = {
            'ross': { name: '罗斯', avatar: '🦕', intro: '古生物学家，学霸' },
            'rachel': { name: '瑞秋', avatar: '👗', intro: '时尚达人' },
            'monica': { name: '莫妮卡', avatar: '🍳', intro: '厨师，完美主义者' },
            'chandler': { name: '钱德勒', avatar: '😎', intro: '幽默担当' },
            'joey': { name: '乔伊', avatar: '🍕', intro: '演员，吃货' },
            'phoebe': { name: '菲比', avatar: '🎸', intro: '按摩师，古灵精怪' }
        };
        
        const toxicityNames = {
            1: '温和',
            2: '直白',
            3: '毒舌',
            4: '疯狂'
        };
        
        // ============================================
        // 初始化
        // ============================================
        
        function init() {
            initFriendSelector();
            updateToxicityButtons();
        }
        
        function initFriendSelector() {
            const selector = document.getElementById('friendSelector');
            selector.innerHTML = '';
            
            for (const [id, friend] of Object.entries(friends)) {
                const card = document.createElement('div');
                card.className = 'friend-card' + (id === currentFriend ? ' selected' : '');
                card.style.position = 'relative';
                card.innerHTML = `
                    <div class="friend-avatar">${friend.avatar}</div>
                    <div class="friend-name">${friend.name}</div>
                    <div class="friend-intro">${friend.intro}</div>
                `;
                card.onclick = () => selectFriend(id);
                selector.appendChild(card);
            }
        }
        
        // ============================================
        // 选择功能
        // ============================================
        
        async function selectFriend(friendId) {
            if (friendId === currentFriend) return;
            
            const previousFriend = currentFriend;
            currentFriend = friendId;
            initFriendSelector();
            
            // 如果聊天已开始，切换到新好友
            if (chatStarted) {
                await switchToNewFriend(previousFriend, friendId);
            }
        }
        
        async function switchToNewFriend(oldFriendId, newFriendId) {
            const oldName = friends[oldFriendId].name;
            const newName = friends[newFriendId].name;
            
            // 显示系统消息：好友切换
            addMessage(`${oldName} 暂时离开，${newName} 加入了对话`, 'system', '系统');
            
            // 通知后端切换好友
            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        friend: newFriendId,
                        toxicity: currentToxicity
                    })
                });
                
                if (response.ok) {
                    lastApiFriend = newFriendId;
                    const data = await response.json();
                    // 新好友打招呼
                    setTimeout(() => {
                        addMessage(data.reply, false, newName);
                    }, 500);
                }
            } catch (error) {
                console.error('切换好友失败:', error);
                addMessage('切换好友时出现问题，请刷新页面重试', 'system', '系统');
            }
        }
        
        function selectToxicity(level) {
            if (level === currentToxicity) return;
            
            currentToxicity = level;
            updateToxicityButtons();
            
            if (chatStarted) {
                updateToxicityLevel();
            }
        }
        
        function updateToxicityButtons() {
            document.querySelectorAll('.toxicity-btn').forEach(btn => {
                const level = parseInt(btn.dataset.level);
                btn.classList.toggle('selected', level === currentToxicity);
            });
            
            const levelName = document.getElementById('currentLevelName');
            levelName.textContent = toxicityNames[currentToxicity];
            levelName.style.color = getToxicityColor(currentToxicity);
        }
        
        function getToxicityColor(level) {
            const colors = {
                1: 'var(--cyber-blue)',
                2: 'var(--cyber-green)',
                3: 'var(--cyber-yellow)',
                4: 'var(--cyber-pink)'
            };
            return colors[level] || 'var(--cyber-blue)';
        }
        
        // ============================================
        // 聊天功能
        // ============================================
        
        async function startChat() {
            const startButton = document.getElementById('startButton');
            startButton.disabled = true;
            startButton.innerHTML = '<span>⏳</span><span>连接中...</span>';
            
            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        friend: currentFriend,
                        toxicity: currentToxicity
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    chatStarted = true;
                    lastApiFriend = currentFriend;
                    
                    // 显示聊天容器
                    document.getElementById('chatContainer').classList.remove('hidden');
                    document.getElementById('chatArea').innerHTML = '';
                    
                    // 显示开场白
                    addMessage(data.reply, false, friends[currentFriend].name);
                    
                    // 启用输入
                    document.getElementById('sendButton').disabled = false;
                    document.getElementById('messageInput').disabled = false;
                    document.getElementById('messageInput').focus();
                    
                    // 更新按钮为重新开始
                    updateActionButtonToRestart();
                    
                    // 滚动到聊天区域
                    document.getElementById('chatContainer').scrollIntoView({ behavior: 'smooth' });
                } else {
                    throw new Error('启动失败');
                }
            } catch (error) {
                addMessage('连接失败，请重试', 'system', '系统');
                startButton.disabled = false;
                startButton.innerHTML = '<span>🚀</span><span>开始聊天</span>';
            }
        }
        
        function updateActionButtonToRestart() {
            document.getElementById('actionButtons').innerHTML = `
                <button class="main-btn restart-btn" id="restartButton" onclick="restartChat()">
                    <span>🔄</span>
                    <span>重新开始</span>
                </button>
            `;
        }
        
        function updateActionButtonToStart() {
            document.getElementById('actionButtons').innerHTML = `
                <button class="main-btn start-chat-btn" id="startButton" onclick="startChat()">
                    <span>🚀</span>
                    <span>开始聊天</span>
                </button>
            `;
        }
        
        function restartChat() {
            chatStarted = false;
            lastApiFriend = currentFriend;
            document.getElementById('chatContainer').classList.add('hidden');
            document.getElementById('chatArea').innerHTML = '';
            document.getElementById('sendButton').disabled = true;
            document.getElementById('messageInput').disabled = true;
            document.getElementById('messageInput').value = '';
            updateActionButtonToStart();
        }
        
        async function updateToxicityLevel() {
            try {
                const response = await fetch('/api/level', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ toxicity: currentToxicity })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addMessage(`毒舌等级已调整为: ${data.level_name}`, 'system', '系统');
                }
            } catch (error) {
                console.error('更新毒舌等级失败:', error);
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !chatStarted) return;
            
            // 显示用户消息
            addMessage(message, true, '你');
            input.value = '';
            
            // 显示打字指示器
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                removeTypingIndicator();
                
                if (response.ok) {
                    const data = await response.json();
                    // 使用当前选中的好友名字（而不是API返回的）
                    addMessage(data.reply, false, friends[currentFriend].name);
                } else {
                    addMessage('抱歉，我好像卡住了...', false, friends[currentFriend].name);
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('网络错误，请重试', 'system', '系统');
            }
        }
        
        function addMessage(text, type, sender) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            
            if (type === 'system') {
                messageDiv.className = 'message system-message';
            } else if (type === true || type === 'user') {
                messageDiv.className = 'message user-message';
            } else {
                messageDiv.className = 'message friend-message';
            }
            
            messageDiv.innerHTML = `
                <div class="message-sender">${sender}</div>
                <div>${escapeHtml(text)}</div>
            `;
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function showTypingIndicator() {
            const chatArea = document.getElementById('chatArea');
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            chatArea.appendChild(indicator);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
